#ZINGO Make sure your [stepper_z] section looks like this as the stock file has the position_min set to -10!! this is crazy & should NOT be this much, -1.5 is much better as if you ever have a homing error the printer wont try to plant the nozzle through the floor!
[stepper_z]  #z1
step_pin: PA8
dir_pin: PC9
enable_pin: !PA10
rotation_distance: 40         
gear_ratio: 80:12             
microsteps: 16
endstop_pin: probe: z_virtual_endstop
position_max: 505             
position_min: -1.5 #-10              
homing_speed: 10.0
homing_retract_dist: 5.0
homing_retract_speed: 10.0
second_homing_speed: 5.0



